name: Create Daily Issue

on:
  schedule:
    # JST 06:00 = UTC 21:00 previous day
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PERSONAL_AI_KB_TOKEN }}
      GITHUB_OWNER: ${{ github.repository_owner }}
      GITHUB_REPO: ${{ github.event.repository.name }}
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/create_daily_issue.py
