name: Export Daily Issue

on:
  schedule:
    # JST 23:30 = UTC 14:30
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PERSONAL_AI_KB_TOKEN }}
      GITHUB_OWNER: ${{ github.repository_owner }}
      GITHUB_REPO: ${{ github.event.repository.name }}
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/export_daily_issue.py
      - run: python scripts/build_index.py
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add blog knowledge/INDEX.md
          git commit -m "Export daily issue" || exit 0
          git push
