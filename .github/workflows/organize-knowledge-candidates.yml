name: Organize Knowledge Candidates

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  organize:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PERSONAL_AI_KB_TOKEN }}
      GITHUB_OWNER: ${{ github.repository_owner }}
      GITHUB_REPO: ${{ github.event.repository.name }}
      TZ: Asia/Tokyo
      AI_PROVIDER: none
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/ai_organize_issue.py
      - run: python scripts/build_index.py
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add knowledge
          git commit -m "Organize knowledge candidates" || exit 0
          git push
